<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Market - Avocado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="m-0 min-h-screen bg-white p-0 text-black font-sans">

    <header
        class="flex justify-between w-screen h-20 px-5 py-3 bg-gradient-to-r from-slate-50 to-green-200 fixed left-0 top-0 z-50">
        <h2 class="text-[#3F7D20] text-5xl font-extrabold font-sans">Organic Market</h2>
        <div class="flex gap-6 font-sans items-center">

            <button class="font-extrabold text-[#3F7D20]">HOME</button>
            <a href="shop/all-products.html"><button class="font-extrabold text-[#3F7D20]">SHOP</button></a>
            <button class="font-extrabold text-[#3F7D20]">ABOUT</button>
            <button><img class="w-10 h-10 object-contain" src="../assets/icons8-shop-48.png" alt="cart"></button>
        </div>
    </header>

    <main class="pt-28 pb-16 max-w-5xl mx-auto px-5">

        <!-- Loading -->
        <div id="loading-box" class="py-20 text-center text-gray-500">
            Loading product...
        </div>

        <!-- Product Section -->
        <section id="product-section" class="hidden grid grid-cols-1 md:grid-cols-2 gap-12 items-start">

            <!-- Product Images -->
            <div class="space-y-4">
                <div class="rounded-3xl overflow-hidden border border-gray-100 shadow-sm">
                    <img id="main-product-image" src="" class="w-full h-[400px] object-cover" alt="product image">
                </div>

                <div id="product-thumbnails" class="grid grid-cols-4 gap-3"></div>
            </div>

            <!-- Product Info -->
            <div class="flex flex-col gap-4">
                <span id="product-category"
                    class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold w-fit">
                </span>

                <h1 id="product-name" class="text-4xl font-bold"></h1>

                <p id="product-price" class="text-2xl font-bold text-green-600"></p>

                <p id="product-description" class="text-gray-500 leading-relaxed"></p>

                <!-- Quantity - فعلاً فقط ظاهری -->
                <div class="flex items-center gap-4 mt-2">
                    <div class="flex items-center border border-gray-200 rounded-lg">
                        <button class="px-3 py-1 text-gray-500 hover:text-green-600">-</button>
                        <span class="px-4 py-1 font-medium">1</span>
                        <button class="px-3 py-1 text-gray-500 hover:text-green-600">+</button>
                    </div>
                </div>

                <!-- Add To Cart - فعلاً بدون منطق -->
                <button
                    class="bg-green-800 hover:bg-green-900 text-white font-bold py-3 px-8 rounded-lg transition mt-2 w-fit">
                    Add To Cart
                </button>

                <!-- Product Details -->
                <div class="mt-8 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                    <h3 class="font-bold text-lg mb-2">Product Details</h3>
                    <p id="product-details" class="text-gray-600 text-sm"></p>
                </div>
            </div>
        </section>

        <!-- Reviews -->
        <section id="reviews-section" class="hidden mt-20">
            <h2 class="text-2xl font-bold mb-8">Customer Reviews</h2>
            <div id="reviews-container" class="space-y-4"></div>
        </section>

    </main>

    <footer class="bg-slate-950 text-white border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-8 py-12">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-10">

                <!-- Brand -->
                <div>
                    <h3 class="font-bold text-lg mb-4">
                        OrganicMarket
                    </h3>
                    <p class="text-slate-300 leading-relaxed">
                        Premium organic products.
                    </p>
                </div>

                <!-- Shop -->
                <div>
                    <h3 class="font-bold text-lg mb-4">
                        Shop
                    </h3>
                    <ul class="space-y-2 text-slate-300">
                        <li>
                            <a href="#" class="hover:text-white transition">
                                Vegetables
                            </a>
                        </li>
                        <li>
                            <a href="#" class="hover:text-white transition">
                                Fruits
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Support -->
                <div>
                    <h3 class="font-bold text-lg mb-4">
                        Support
                    </h3>
                    <ul class="space-y-2 text-slate-300">
                        <li>
                            <a href="#" class="hover:text-white transition">
                                FAQ
                            </a>
                        </li>
                        <li>
                            <a href="#" class="hover:text-white transition">
                                Contact
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Newsletter -->
                <div>
                    <h3 class="font-bold text-lg mb-4">
                        Newsletter
                    </h3>

                    <input type="email" placeholder="Email"
                        class="w-full rounded-md bg-white text-black px-4 py-3 outline-none" />
                </div>

            </div>
        </div>
        <!-- Bottom Bar -->
        <div class="border-t border-slate-800 py-5 text-center text-slate-300">
            © 2026 OrganicMarket
        </div>
    </footer>
    <script src="product.js"></script>
</body>

</html>
